<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — Omnes MarketPlace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .notif-item{display:flex;gap:var(--space-4);padding:var(--space-5);border-bottom:1px solid var(--clr-border);transition:background var(--transition);cursor:pointer}
    .notif-item:hover{background:var(--clr-light)}
    .notif-item.unread{background:rgba(108,63,197,.04)}
    .notif-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem}
    .notif-icon.enchere{background:var(--clr-accent-lt);color:var(--clr-accent)}
    .notif-icon.nego{background:var(--clr-primary-lt);color:var(--clr-primary)}
    .notif-icon.commande{background:var(--clr-teal-lt);color:var(--clr-teal)}
    .notif-icon.systeme{background:rgba(249,199,79,.15);color:var(--clr-gold)}
    .notif-dot{width:8px;height:8px;border-radius:50%;background:var(--clr-primary);flex-shrink:0;margin-top:6px}
  </style>
</head>
<body>

<header class="header" id="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon"><i class="fas fa-store"></i></div>
      <span style="color:var(--clr-primary)">Omnes</span><span style="color:var(--clr-accent)">Market</span>
    </a>
    <nav class="nav">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="browse.html" class="nav-link">Parcourir</a>
    </nav>
    <div class="header-actions">
      <button class="icon-btn active" onclick="location.href='notifications.html'">
        <i class="fas fa-bell" style="color:var(--clr-primary)"></i>
        <span class="badge-count" id="notifBadge" style="display:none">0</span>
      </button>
      <button class="icon-btn" onclick="location.href='panier.html'">
        <i class="fas fa-shopping-cart"></i>
        <span class="badge-count" id="cartBadge" style="display:none">0</span>
      </button>
      <div class="user-menu" id="userMenu" style="display:none">
        <button class="user-avatar" id="userAvatarBtn">JS</button>
        <div class="dropdown-menu" id="userDropdown">
          <a href="compte.html" class="dropdown-item"><i class="fas fa-user"></i> Mon compte</a>
          <a href="notifications.html" class="dropdown-item active"><i class="fas fa-bell"></i> Notifications</a>
          <hr>
          <button class="dropdown-item danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
        </div>
      </div>
      <a href="login.html" class="btn btn-primary" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Connexion</a>
      <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
    </div>
  </div>
</header>

<!-- PAGE HEADER -->
<div style="background:linear-gradient(135deg,var(--clr-light),#fff5f5);border-bottom:1px solid var(--clr-border);padding:var(--space-8) 0">
  <div class="container">
    <div class="breadcrumb mb-2">
      <a href="index.html">Accueil</a>
      <span class="breadcrumb-sep"><i class="fas fa-chevron-right" style="font-size:.6rem"></i></span>
      <span>Notifications</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
      <div>
        <h1 style="font-size:var(--text-3xl);margin-bottom:.25rem">
          <i class="fas fa-bell text-primary"></i> Notifications
        </h1>
        <p class="text-mid" id="notifCount">Chargement…</p>
      </div>
      <button class="btn btn-outline btn-sm" id="markAllRead">
        <i class="fas fa-check-double"></i> Tout marquer comme lu
      </button>
    </div>
  </div>
</div>

<main class="section-sm">
  <div class="container" style="max-width:760px">

    <!-- Filtres pills -->
    <div class="pills-bar mb-4" id="notifFilter">
      <button class="pill active" data-type="">Toutes</button>
      <button class="pill" data-type="enchere"><i class="fas fa-gavel"></i> Enchères</button>
      <button class="pill" data-type="nego"><i class="fas fa-comments-dollar"></i> Négociations</button>
      <button class="pill" data-type="commande"><i class="fas fa-box"></i> Commandes</button>
      <button class="pill" data-type="systeme"><i class="fas fa-info-circle"></i> Système</button>
    </div>

    <!-- Liste -->
    <div style="background:var(--clr-white);border:1px solid var(--clr-border);border-radius:var(--radius);overflow:hidden" id="notifList">
      <div class="spinner" style="margin:3rem auto"></div>
    </div>

  </div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 Omnes MarketPlace</span>
      <div class="payment-icons">
        <span class="payment-icon">VISA</span>
        <span class="payment-icon">MC</span>
        <span class="payment-icon">CB</span>
      </div>
    </div>
  </div>
</footer>

<div class="toast-container" id="toastContainer"></div>

<script src="../assets/js/utils.js"></script>
<script src="js/main.js"></script>
<script>
const NOTIF_ICONS = {
  enchere:  { icon: 'fa-gavel',            cls: 'enchere' },
  nego:     { icon: 'fa-comments-dollar',  cls: 'nego'    },
  commande: { icon: 'fa-box',              cls: 'commande'},
  systeme:  { icon: 'fa-info-circle',      cls: 'systeme' },
};

let allNotifs = [];
let activeType = '';

async function loadNotifs() {
  const list = document.getElementById('notifList');
  try {
    const r = await apiGet(`${API.notifications}?action=liste`);
    if (!r.success) throw new Error(r.message);
    allNotifs = r.data?.notifications || [];
    renderNotifs();
  } catch {
    // Données démo si pas de BDD
    allNotifs = [
      { notif_id:1, type_notif:'enchere',  message:'Vous avez été dépassé sur l\'enchère « MacBook Pro M3 ». Enchère actuelle : 1 250 €', date_creation: new Date(Date.now()-300000).toISOString(), lu:0 },
      { notif_id:2, type_notif:'nego',     message:'Jean Dupont a accepté votre offre de 85 € pour « Livre d\'économie avancée ».', date_creation: new Date(Date.now()-3600000).toISOString(), lu:0 },
      { notif_id:3, type_notif:'commande', message:'Votre commande OMN-A7F2E9B1 a été confirmée. Livraison estimée sous 3-5 jours.', date_creation: new Date(Date.now()-86400000).toISOString(), lu:1 },
      { notif_id:4, type_notif:'systeme',  message:'Bienvenue sur Omnes MarketPlace ! Parcourez les articles et faites vos premières enchères.', date_creation: new Date(Date.now()-172800000).toISOString(), lu:1 },
    ];
    renderNotifs();
  }
}

function renderNotifs() {
  const list = document.getElementById('notifList');
  const countEl = document.getElementById('notifCount');

  const filtered = activeType ? allNotifs.filter(n => n.type_notif === activeType) : allNotifs;
  const unread = allNotifs.filter(n => !n.lu).length;

  if (countEl) countEl.textContent = unread > 0 ? `${unread} non lue${unread>1?'s':''}` : 'Toutes lues';

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><i class="fas fa-bell-slash"></i><p>Aucune notification.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(n => {
    const cfg = NOTIF_ICONS[n.type_notif] || NOTIF_ICONS.systeme;
    return `
    <div class="notif-item ${n.lu?'':'unread'}" onclick="markRead(${n.notif_id}, this)">
      <div class="notif-icon ${cfg.cls}"><i class="fas ${cfg.icon}"></i></div>
      <div style="flex:1;min-width:0">
        <p style="margin:0;font-size:var(--text-sm);line-height:1.5">${n.message}</p>
        <span class="text-xs text-mid" style="margin-top:.25rem;display:block">
          ${Format.relativeTime(n.date_creation)}
        </span>
      </div>
      ${!n.lu ? '<div class="notif-dot"></div>' : ''}
    </div>`;
  }).join('');
}

async function markRead(id, el) {
  el?.classList.remove('unread');
  const dot = el?.querySelector('.notif-dot');
  if (dot) dot.remove();
  try {
    await apiPost(API.notifications, { action: 'marquer_lu', notif_id: id });
    const n = allNotifs.find(x => x.notif_id === id);
    if (n) n.lu = 1;
    const unread = allNotifs.filter(x => !x.lu).length;
    const countEl = document.getElementById('notifCount');
    if (countEl) countEl.textContent = unread > 0 ? `${unread} non lue${unread>1?'s':''}` : 'Toutes lues';
    const badge = document.getElementById('notifBadge');
    if (badge) { badge.textContent = unread; badge.style.display = unread > 0 ? 'flex' : 'none'; }
  } catch {}
}

document.addEventListener('DOMContentLoaded', () => {
  window.authReady.then((user) => {
    if (!user) { location.href = 'login.html'; return; }
    loadNotifs();
  });

  // Filtres
  document.querySelectorAll('#notifFilter .pill').forEach(p => {
    p.addEventListener('click', () => {
      document.querySelectorAll('#notifFilter .pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      activeType = p.dataset.type;
      renderNotifs();
    });
  });

  // Marquer tout lu
  document.getElementById('markAllRead')?.addEventListener('click', async () => {
    allNotifs.forEach(n => n.lu = 1);
    renderNotifs();
    const badge = document.getElementById('notifBadge');
    if (badge) { badge.textContent='0'; badge.style.display='none'; }
    try { await apiPost(API.notifications, { action: 'marquer_tous_lu' }); } catch {}
    Toast.success('Toutes les notifications ont été lues.');
  });
});
</script>
</body>
</html>
